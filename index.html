<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini WC 2026 — Sticker Tracker</title>
<style>
  :root{
    --bg:#0e1420; --panel:#161f30; --panel2:#1d2942; --line:#28364f;
    --text:#e8edf6; --muted:#8fa0ba; --accent:#2ec27e; --accent2:#4d8dff;
    --danger:#e05b5b; --gold:#e8b93c; --radius:12px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px; margin:0 auto; padding:16px 14px 90px;}

  header{padding:6px 0 14px;}
  .title-row{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;}
  h1{font-size:1.25rem; letter-spacing:.3px;}
  h1 .fifa{color:var(--gold);}
  .progress-label{color:var(--muted); font-size:.85rem;}
  .bar{height:8px; background:var(--panel2); border-radius:99px; margin-top:10px; overflow:hidden;}
  .bar > div{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; transition:width .35s ease; width:0;}

  .search-row{position:sticky; top:0; z-index:20; background:var(--bg); padding:8px 0 10px;}
  .search-box{position:relative;}
  .search-box input{
    width:100%; padding:12px 40px 12px 40px; font-size:1rem;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    color:var(--text); outline:none;
  }
  .search-box input:focus{border-color:var(--accent2);}
  .search-box .icon{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none;}
  .search-box .clear{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer;
    padding:6px 8px; border-radius:8px; display:none;
  }
  .search-box .clear:hover{color:var(--text);}

  .view-tabs{display:flex; gap:6px; margin:4px 0 12px;}
  .view-tabs button{
    flex:1; padding:10px 6px; font-size:.92rem; font-weight:600;
    background:var(--panel); color:var(--muted);
    border:1px solid var(--line); border-radius:10px; cursor:pointer;
  }
  .view-tabs button.active{background:var(--panel2); color:var(--text); border-color:var(--accent2);}
  .view-tabs button .cnt{font-weight:400; opacity:.75; font-size:.82rem;}

  .chips{display:flex; gap:6px; overflow-x:auto; padding:2px 0 10px; scrollbar-width:thin;}
  .chips::-webkit-scrollbar{height:5px;}
  .chips::-webkit-scrollbar-thumb{background:var(--line); border-radius:99px;}
  .chip{
    flex:0 0 auto; padding:7px 12px; font-size:.85rem; white-space:nowrap;
    background:var(--panel); color:var(--muted);
    border:1px solid var(--line); border-radius:99px; cursor:pointer;
  }
  .chip.active{background:var(--accent2); border-color:var(--accent2); color:#fff;}
  .chip .n{opacity:.7; font-size:.78rem;}

  .group-title{
    margin:16px 2px 8px; font-size:.8rem; font-weight:700; letter-spacing:.8px;
    text-transform:uppercase; color:var(--muted);
    display:flex; justify-content:space-between; align-items:baseline;
  }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    display:flex; align-items:center; gap:12px; padding:10px 12px; margin-bottom:8px;
  }
  .code-badge{
    flex:0 0 auto; min-width:64px; text-align:center;
    background:var(--panel2); border:1px solid var(--line); border-radius:8px;
    padding:7px 8px; font-weight:700; font-size:.85rem; letter-spacing:.5px;
  }
  .card .info{flex:1; min-width:0;}
  .card .name{font-size:.95rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .card .meta{font-size:.78rem; color:var(--muted); margin-top:2px;}
  .btn{
    flex:0 0 auto; border:none; border-radius:10px; cursor:pointer;
    font-size:.88rem; font-weight:700; padding:10px 14px;
  }
  .btn-got{background:var(--accent); color:#08301d;}
  .btn-got:active{transform:scale(.96);}
  .btn-undo{background:var(--panel2); color:var(--text); border:1px solid var(--line);}
  .btn-sm{padding:7px 11px; font-size:.85rem;}
  .qty-btn{
    width:34px; height:34px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-size:1.05rem; font-weight:700; cursor:pointer;
  }
  .qty{min-width:26px; text-align:center; font-weight:700;}
  .del-btn{background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.05rem; padding:6px;}
  .del-btn:hover{color:var(--danger);}

  .empty{
    text-align:center; color:var(--muted); padding:40px 16px; font-size:.95rem;
    border:1px dashed var(--line); border-radius:var(--radius); margin-top:12px;
  }
  .empty .big{font-size:2rem; display:block; margin-bottom:8px;}

  .dupe-add{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:12px; margin-bottom:14px;
  }
  .dupe-add label{display:block; font-size:.85rem; color:var(--muted); margin-bottom:8px;}
  .dupe-add .row{display:flex; gap:8px;}
  .dupe-add input{
    flex:1; padding:11px 12px; font-size:1rem; background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; color:var(--text); outline:none;
    text-transform:uppercase;
  }
  .dupe-add input:focus{border-color:var(--accent2);}
  .dupe-add .add{background:var(--accent2); color:#fff;}
  .dupe-msg{font-size:.82rem; margin-top:8px; min-height:1em;}
  .dupe-msg.ok{color:var(--accent);}
  .dupe-msg.err{color:var(--danger);}
  .dupe-total{color:var(--muted); font-size:.85rem; margin:0 2px 10px;}

  #toast{
    position:fixed; left:50%; bottom:20px; transform:translateX(-50%) translateY(80px);
    background:var(--panel2); border:1px solid var(--line); color:var(--text);
    padding:10px 14px; border-radius:12px; display:flex; gap:12px; align-items:center;
    box-shadow:0 8px 24px rgba(0,0,0,.45); transition:transform .25s ease; z-index:50;
    max-width:92vw; font-size:.9rem;
  }
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast button{background:none; border:none; color:var(--accent2); font-weight:700; cursor:pointer; font-size:.9rem;}

  footer{margin-top:28px; text-align:center; color:var(--muted); font-size:.78rem;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-row">
      <h1>⚽ Panini <span class="fifa">World Cup 2026</span> Tracker</h1>

    </div>
    <div class="bar"><div id="progressBar"></div></div>
  </header>

  <div class="search-row">

    </div>

    <button data-view="missing" class="active">Missing <span class="cnt" id="cntMissing"></span></button>
    <button data-view="dupes">Duplicates <span class="cnt" id="cntDupes"></span></button>
    <button data-view="collected">Collected <span class="cnt" id="cntCollected"></span></button>

  <div id="chipBar" class="chips"></div>

  <main id="content"></main>

  <footer>Data saved in this browser (localStorage). 156 stickers on the missing list at start.</footer>
</div>

const LS_KEY = "panini-wc2026-tracker";
let state = {collected: [], dupes: {}};
try {
  const saved = JSON.parse(localStorage.getItem(LS_KEY));
  if (saved && Array.isArray(saved.collected) && typeof saved.dupes === "object") state = saved;
} catch(e) {}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// ---- Helpers ----
const $ = sel => document.querySelector(sel);
const esc = s => s.replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const norm = s => s.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();

function normalizeCode(raw){
  const m = raw.trim().toUpperCase().match(/^([A-Z]{2,4})[\s\-\.]*0*(\d{1,3})$/);
  return m ? `${m[1]} ${m[2]}` : null;
}
function matches(s, q){
  if (!q) return true;
  const nq = norm(q);
  return norm(s.c).includes(nq) || norm(s.n).includes(nq) || norm(s.t).includes(nq);
}
const isCollected = c => state.collected.includes(c);
const missingList = () => STICKERS.filter(s => !isCollected(s.c));
const collectedList = () => state.collected.map(c => BY_CODE[c]).filter(Boolean);

// ---- Toast (with undo) ----
let toastTimer = null, undoFn = null;
function toast(msg, undo){
  const t = $("#toast");
  undoFn = undo || null;
  t.innerHTML = esc(msg) + (undo ? ' <button onclick="doUndo()">UNDO</button>' : "");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 4000);
}
function doUndo(){
  if (undoFn) undoFn();
  undoFn = null;
  $("#toast").classList.remove("show");
  render();
}

// ---- Actions ----
function collect(code){
  if (!isCollected(code)) state.collected.push(code);
  save(); render();
  const s = BY_CODE[code];
  toast(`✓ Collected ${code}${s ? " — " + s.n : ""}`, () => {
    state.collected = state.collected.filter(c => c !== code); save();
  });
}
function uncollect(code){
  state.collected = state.collected.filter(c => c !== code);
  save(); render();
  toast(`${code} moved back to missing`);
}
function addDupes(){
  const input = $("#dupeInput");
  const parts = input.value.split(/[,;\n]+/).map(x => x.trim()).filter(Boolean);
  if (!parts.length) return;
  const added = [], bad = [];
  for (const p of parts){
    const code = normalizeCode(p);
    if (code){ state.dupes[code] = (state.dupes[code] || 0) + 1; added.push(code); }
    else bad.push(p);
  }
  save();
  const msg = $("#dupeMsg");
  if (added.length && !bad.length){
    input.value = "";
    msg.className = "dupe-msg ok"; msg.textContent = `Added: ${added.join(", ")}`;
  } else if (added.length){
    input.value = bad.join(", ");
    msg.className = "dupe-msg err"; msg.textContent = `Added ${added.join(", ")} — didn't understand: ${bad.join(", ")}`;
  } else {
    msg.className = "dupe-msg err"; msg.textContent = `Couldn't read code(s): ${bad.join(", ")} (use format like MEX 02 or POR 10)`;
  }
  renderKeepMsg();
  $("#dupeInput").focus();
}
function dupeQty(code, delta){
  const v = (state.dupes[code] || 0) + delta;
  if (v <= 0) delete state.dupes[code]; else state.dupes[code] = v;
  save(); render();
}
function dupeRemove(code){
  delete state.dupes[code]; save(); render();
  toast(`Removed ${code} from duplicates`);
}

// ---- Rendering ----
function stickerCard(s, btnHtml){
  return `<div class="card">
    <div class="code-badge">${esc(s.c)}</div>
    <div class="info">
      <div class="name">${esc(s.n)}</div>
      <div class="meta">${esc(s.t)} · page ${esc(s.p)}</div>
    </div>
    ${btnHtml}
  </div>`;
}

function renderMissing(el){
  let list = missingList().filter(s => matches(s, query));
  if (countryFilter !== "ALL") list = list.filter(s => s.t === countryFilter);
  if (!list.length){
    el.innerHTML = missingList().length === 0
      ? `<div class="empty"><span class="big">🏆</span>Album complete — no missing stickers!</div>`
      : `<div class="empty"><span class="big">🔍</span>No missing stickers match.</div>`;
    return;
  }
  const groups = new Map();
  for (const s of list){
    if (!groups.has(s.t)) groups.set(s.t, []);
    groups.get(s.t).push(s);
  }
  let html = "";
  for (const t of COUNTRY_ORDER){
    if (!groups.has(t)) continue;
    const g = groups.get(t);
    html += `<div class="group-title"><span>${esc(t)}</span><span>${g.length} missing</span></div>`;
    html += g.map(s => stickerCard(s,
      `<button class="btn btn-got" onclick="collect('${s.c}')">✓ Got it</button>`)).join("");
  }
  el.innerHTML = html;
}

function renderDupes(el){
  const total = Object.values(state.dupes).reduce((a,b)=>a+b,0);
  let html = `<div class="dupe-add">
    <label for="dupeInput">Add duplicate sticker codes (comma-separated, e.g. <b>MEX 02, POR 10</b>)</label>
    <div class="row">
      <input id="dupeInput" placeholder="MEX 02, POR 10" autocomplete="off"
             onkeydown="if(event.key==='Enter')addDupes()">
      <button class="btn add" onclick="addDupes()">＋ Add</button>
    </div>
    <div id="dupeMsg" class="dupe-msg"></div>
  </div>`;
  const codes = Object.keys(state.dupes)
    .filter(c => { const s = BY_CODE[c] || {c, n:"", t:"", p:""}; return matches({...s, c}, query); })
    .sort((a,b) => a.localeCompare(b, undefined, {numeric:true}));
  if (total) html += `<div class="dupe-total">${total} duplicate sticker${total>1?"s":""} · ${Object.keys(state.dupes).length} different</div>`;
  if (!codes.length){
    html += `<div class="empty"><span class="big">📦</span>${total ? "No duplicates match your search." : "No duplicates yet. Add codes above."}</div>`;
  } else {
    html += codes.map(code => {
      const s = BY_CODE[code];
      const qty = state.dupes[code];
      return `<div class="card">
        <div class="code-badge">${esc(code)}</div>
        <div class="info">
          <div class="name">${s ? esc(s.n) : "—"}</div>
          <div class="meta">${s ? esc(s.t) + " · page " + esc(s.p) : "not on your missing list"}</div>
        </div>
        <button class="qty-btn" onclick="dupeQty('${code}',-1)">−</button>
        <span class="qty">${qty}</span>
        <button class="qty-btn" onclick="dupeQty('${code}',1)">+</button>
        <button class="del-btn" title="Remove" onclick="dupeRemove('${code}')">🗑</button>
      </div>`;
    }).join("");
  }
  el.innerHTML = html;
}

function renderCollected(el){
  const list = collectedList().filter(s => matches(s, query));
  if (!list.length){
    el.innerHTML = `<div class="empty"><span class="big">📋</span>${state.collected.length ? "No collected stickers match." : "Nothing collected yet. Tap “Got it” on a sticker when you find it."}</div>`;
    return;
  }
  el.innerHTML = `<div class="dupe-total">Tap ↩ if you marked one by mistake.</div>` +
    [...list].reverse().map(s => stickerCard(s,
      `<button class="btn btn-undo btn-sm" onclick="uncollect('${s.c}')">↩ Back to missing</button>`)).join("");
}

function renderChips(){
  const bar = $("#chipBar");
  if (view !== "missing"){ bar.style.display = "none"; return; }
  bar.style.display = "flex";
  const remaining = missingList();
  const counts = {};
  for (const s of remaining) counts[s.t] = (counts[s.t] || 0) + 1;
  let html = `<button class="chip ${countryFilter==="ALL"?"active":""}" onclick="setCountry('ALL')">All <span class="n">${remaining.length}</span></button>`;
  for (const t of COUNTRY_ORDER){
    if (!counts[t]) continue;
    html += `<button class="chip ${countryFilter===t?"active":""}" onclick="setCountry('${esc(t).replace(/'/g,"\\'")}')">${esc(t)} <span class="n">${counts[t]}</span></button>`;
  }
  bar.innerHTML = html;
}
function setCountry(t){ countryFilter = t; render(); }

function renderKeepMsg(){
  // re-render but preserve dupe input focus/message (used after adding dupes)
  const msg = $("#dupeMsg") ? $("#dupeMsg").outerHTML : null;
  const val = $("#dupeInput") ? $("#dupeInput").value : "";
  render();
  if (view === "dupes" && msg){
    $("#dupeMsg").outerHTML = msg;
    $("#dupeInput").value = val;
  }
}

function render(){
  const missing = missingList().length;
  const collected = state.collected.length;
  const totalDupes = Object.values(state.dupes).reduce((a,b)=>a+b,0);
  $("#progressLabel").textContent = `${collected} of ${STICKERS.length} found · ${missing} missing`;
  $("#progressBar").style.width = (collected / STICKERS.length * 100) + "%";
  $("#cntMissing").textContent = `(${missing})`;
  $("#cntDupes").textContent = `(${totalDupes})`;
  $("#cntCollected").textContent = `(${collected})`;
  document.querySelectorAll(".view-tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.view === view));
  renderChips();
  const el = $("#content");
  if (view === "missing") renderMissing(el);
  else if (view === "dupes") renderDupes(el);
  else renderCollected(el);
  $("#searchClear").style.display = query ? "block" : "none";
}

// ---- Events ----
document.querySelectorAll(".view-tabs button").forEach(b =>
  b.addEventListener("click", () => { view = b.dataset.view; render(); }));
$("#search").addEventListener("input", e => { query = e.target.value; render(); });
$("#searchClear").addEventListener("click", () => {
  query = ""; $("#search").value = ""; render(); $("#search").focus();
});

render();
</script>
</body>
</html>
